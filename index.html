<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yellowstone Trip · Photo Album</title>
<!--
  ============================================================
  YELLOWSTONE TRIP PHOTO ALBUM  ·  one-time setup
  ============================================================
  1. Supabase -> Storage -> New bucket, name it exactly:
     yellowstone-album   (turn ON "Public bucket")
  2. Supabase -> SQL Editor -> run the script at the bottom
     of this file.
  3. CONFIG below is pre-filled for your album project. Edit
     TRIP_NAME / DATES if you like, then host this file.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1d4a5b; --pine:#23423a; --kraft:#e9dcc1; --kraft2:#f3ead4;
    --rust:#c2552e; --gold:#e0a53f; --bark:#5a4632; --ink:#2f2a20;
    --mute:#857658; --line:#d6c6a4;
    --shadow:0 16px 36px -20px rgba(47,42,32,.5);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{ background:var(--kraft); color:var(--ink); font-family:"Oswald",sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; }

  /* banner */
  .banner{ position:relative; width:100%; height:clamp(300px,42vw,470px); overflow:hidden; }
  .banner .scene{ position:absolute; inset:0; }
  .banner .overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 18px; }
  .eyebrow{ color:#f7eede; font-weight:500; letter-spacing:6px; font-size:clamp(12px,2vw,16px); text-transform:uppercase; margin:0; text-shadow:0 2px 8px rgba(20,30,30,.5); }
  .title{ font-family:"Alfa Slab One",serif; color:#fbf3e2; font-size:clamp(46px,11vw,108px); line-height:.95; margin:6px 0 4px; letter-spacing:1px; text-shadow:0 4px 0 rgba(40,24,16,.28), 0 10px 26px rgba(20,12,8,.4); }
  .dates{ color:#fbf0db; font-weight:500; letter-spacing:3px; font-size:clamp(14px,2.4vw,20px); text-shadow:0 2px 8px rgba(20,30,30,.5); display:flex; align-items:center; gap:12px; }
  .dates .pk{ color:#f6c45a; }

  .wrap{ max-width:1120px; margin:0 auto; padding:0 18px 90px; }

  /* uploader */
  .uploader{ background:var(--kraft2); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:clamp(22px,4vw,34px); max-width:640px; margin:-50px auto 0; position:relative; z-index:2; }
  .badge{ position:absolute; top:-22px; left:50%; transform:translateX(-50%); background:var(--rust); color:#fff; font-weight:600; letter-spacing:2px; font-size:12px; text-transform:uppercase; padding:8px 18px; border-radius:30px; box-shadow:0 6px 16px -6px rgba(0,0,0,.4); }
  .drop{ border:2px dashed var(--line); border-radius:13px; padding:30px 18px; text-align:center; cursor:pointer; transition:border-color .18s, background .18s; margin-top:8px; }
  .drop:hover,.drop.over{ border-color:var(--gold); background:#fbf6ea; }
  .drop .big{ font-family:"Pacifico",cursive; color:var(--pine); font-size:30px; line-height:1; }
  .drop .sub{ color:var(--mute); font-size:16px; margin-top:8px; font-weight:300; }
  input[type=file]{ display:none; }
  .meta{ display:grid; gap:12px; margin-top:18px; }
  input[type=text]{ width:100%; font-family:"Oswald",sans-serif; font-weight:300; font-size:17px; color:var(--ink); background:#fffdf7; border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  input[type=text]:focus{ outline:none; border-color:var(--gold); }
  input::placeholder{ color:#b6a886; }
  .queue{ display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
  .thumb{ position:relative; width:74px; height:74px; border-radius:9px; overflow:hidden; border:1px solid var(--line); }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .thumb .x{ position:absolute; top:2px; right:2px; width:20px; height:20px; border:none; border-radius:50%; background:rgba(47,42,32,.72); color:#fff; cursor:pointer; font-size:13px; line-height:20px; padding:0; }
  .send{ margin-top:20px; width:100%; border:none; cursor:pointer; background:var(--rust); color:#fff; font-family:"Oswald",sans-serif; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; font-size:15px; padding:15px; border-radius:11px; transition:background .18s, transform .12s; }
  .send:hover{ background:#a9461f; transform:translateY(-1px); }
  .send:disabled{ opacity:.5; cursor:default; transform:none; }
  .status{ text-align:center; color:var(--mute); font-size:15px; margin-top:12px; min-height:20px; }
  .banner-note{ max-width:640px; margin:24px auto 0; background:#f5ead0; border:1px solid var(--line); border-radius:10px; padding:11px 16px; text-align:center; color:var(--mute); font-size:15px; }
  .banner-note b{ color:var(--ink); }

  /* gallery */
  .gallery-head{ text-align:center; margin:64px 0 26px; }
  .gallery-head h2{ font-family:"Pacifico",cursive; color:var(--pine); font-weight:400; font-size:clamp(32px,5vw,46px); margin:0; }
  .gallery-head .count{ color:var(--mute); letter-spacing:2px; text-transform:uppercase; font-size:13px; margin-top:8px; }
  .grid{ columns:4 240px; column-gap:16px; }
  .tile{ break-inside:avoid; margin-bottom:16px; background:#fffdf7; padding:10px 10px 0; border:1px solid var(--line); border-radius:6px; box-shadow:var(--shadow); cursor:zoom-in; }
  .tile img{ width:100%; display:block; border-radius:3px; }
  .tile .cap{ padding:9px 4px 12px; }
  .tile .cap .who{ font-weight:600; font-size:15px; color:var(--ink); }
  .tile .cap .note{ color:var(--mute); font-size:14px; font-weight:300; }
  .empty{ text-align:center; color:var(--mute); padding:50px 0; font-size:18px; }

  .lb{ position:fixed; inset:0; background:rgba(24,20,14,.92); display:none; align-items:center; justify-content:center; z-index:50; padding:24px; cursor:zoom-out; }
  .lb.open{ display:flex; }
  .lb img{ max-width:94vw; max-height:88vh; border-radius:6px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .lb .cap{ position:absolute; bottom:22px; left:0; right:0; text-align:center; color:#f3ead4; font-size:17px; }

  @media (max-width:560px){ .grid{ columns:2 150px; } }
</style>
</head>
<body>

    <div class="overlay">
      <p class="eyebrow">Our Trip To</p>
      <h1 class="title" id="trip">Yellowstone</h1>
      <p class="dates"><span class="pk">▲</span><span id="dates">September 4 – 8</span><span class="pk">▲</span></p>

  <div class="wrap">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== CONFIG ===================== */
const SUPABASE_URL = "https://fjpabwmxxyeixjdcfqck.supabase.co";
const SUPABASE_KEY = "sb_publishable_k27PM4OC6zNC0hBjjhfhPw_SRdQr4S1";
const BUCKET       = "yellowstone-album";
const TABLE        = "yellowstone_photos";
const TRIP_NAME    = "Yellowstone";
const DATES        = "September 4 – 8";
/* ================================================== */

document.getElementById("trip").textContent = TRIP_NAME;
document.getElementById("dates").textContent = DATES;
document.title = TRIP_NAME + " Trip · Photo Album";

const LIVE = (typeof supabase !== "undefined") && SUPABASE_URL && !SUPABASE_URL.includes("YOUR_");
const sb = LIVE ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
let demo = [];
if (!LIVE) {
  const b = document.getElementById("banner-note");
  b.style.display = "block";
  b.innerHTML = "<b>Preview mode.</b> Photos here are local only — host this file with your Supabase keys to go live.";
}

let queued = [];
const fileInput = document.getElementById("file");
const drop = document.getElementById("drop");
const queueEl = document.getElementById("queue");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");

fileInput.addEventListener("change", e => addFiles(e.target.files));
["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => addFiles(e.dataTransfer.files));

function addFiles(list){ for (const f of list){ if (f.type.startsWith("image/")) queued.push(f); } renderQueue(); }
function renderQueue(){
  queueEl.innerHTML = "";
  queued.forEach((f,i)=>{
    const d=document.createElement("div"); d.className="thumb";
    const img=document.createElement("img"); img.src=URL.createObjectURL(f); d.appendChild(img);
    const x=document.createElement("button"); x.className="x"; x.textContent="×";
    x.onclick=()=>{ queued.splice(i,1); renderQueue(); }; d.appendChild(x); queueEl.appendChild(d);
  });
  sendBtn.disabled = queued.length===0;
  sendBtn.textContent = queued.length>1 ? ("Add "+queued.length+" photos to the album") : "Add to the album";
}

function processImage(file, maxDim=1800, quality=0.85){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let {width,height}=img;
      if(Math.max(width,height)>maxDim){ const s=maxDim/Math.max(width,height); width=Math.round(width*s); height=Math.round(height*s); }
      const c=document.createElement("canvas"); c.width=width; c.height=height;
      c.getContext("2d").drawImage(img,0,0,width,height);
      c.toBlob(b=>b?resolve(b):reject(new Error("encode failed")),"image/jpeg",quality);
    };
    img.onerror=reject; img.src=URL.createObjectURL(file);
  });
}

sendBtn.addEventListener("click", upload);
async function upload(){
  if(!queued.length) return;
  const name=document.getElementById("name").value.trim()||null;
  const caption=document.getElementById("caption").value.trim()||null;
  sendBtn.disabled=true; const total=queued.length;
  try{
    for(let i=0;i<total;i++){
      statusEl.textContent="Uploading "+(i+1)+" of "+total+"…";
      const blob=await processImage(queued[i]);
      if(LIVE){
        const path=Date.now()+"-"+Math.random().toString(36).slice(2,8)+".jpg";
        const up=await sb.storage.from(BUCKET).upload(path,blob,{contentType:"image/jpeg"});
        if(up.error) throw up.error;
        const { data:{ publicUrl } }=sb.storage.from(BUCKET).getPublicUrl(path);
        const ins=await sb.from(TABLE).insert({ url:publicUrl, path, uploader:name, caption });
        if(ins.error) throw ins.error;
      } else {
        demo.unshift({ url:URL.createObjectURL(blob), uploader:name, caption, created_at:new Date().toISOString() });
      }
    }
    statusEl.textContent = total>1 ? "Added! Your photos are in the album." : "Added! Your photo is in the album.";
    queued=[]; renderQueue();
    document.getElementById("name").value=""; document.getElementById("caption").value="";
    loadGallery();
  }catch(e){
    console.error(e);
    const msg=(e&&(e.message||e.error||e.error_description))||"unknown error";
    statusEl.textContent="Upload failed: "+msg; sendBtn.disabled=false;
  }
}

const grid=document.getElementById("grid"), countEl=document.getElementById("count"), emptyEl=document.getElementById("empty");
async function loadGallery(){
  let rows=[];
  try{
    if(LIVE){ const { data,error }=await sb.from(TABLE).select("*").order("created_at",{ascending:false}); if(error) throw error; rows=data||[]; }
    else { rows=demo; }
  }catch(e){ console.error(e); countEl.textContent="Couldn't load the album."; return; }
  countEl.textContent = rows.length ? (rows.length+" photo"+(rows.length>1?"s":"")+" shared") : "";
  emptyEl.style.display = rows.length ? "none":"block";
  grid.innerHTML = rows.map(r=>{
    const cap=(r.uploader||r.caption)?('<div class="cap">'+(r.uploader?'<div class="who">'+esc(r.uploader)+'</div>':'')+(r.caption?'<div class="note">'+esc(r.caption)+'</div>':'')+'</div>'):'';
    return '<div class="tile" data-url="'+r.url+'" data-cap="'+esc((r.uploader?r.uploader+(r.caption?" — ":""):"")+(r.caption||""))+'"><img loading="lazy" src="'+r.url+'" alt="">'+cap+'</div>';
  }).join("");
  grid.querySelectorAll(".tile").forEach(t=>t.addEventListener("click",()=>openLb(t.dataset.url,t.dataset.cap)));
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const lb=document.getElementById("lb"), lbimg=document.getElementById("lbimg"), lbcap=document.getElementById("lbcap");
function openLb(url,cap){ lbimg.src=url; lbcap.textContent=cap||""; lb.classList.add("open"); }
lb.addEventListener("click",()=>lb.classList.remove("open"));
loadGallery();
</script>

<!--
  =================  yellowstone-setup.sql  =================
  After creating the PUBLIC bucket named  yellowstone-album , run:

  create table if not exists public.yellowstone_photos (
    id uuid primary key default gen_random_uuid(),
    url text not null, path text not null,
    uploader text, caption text,
    created_at timestamptz not null default now()
  );
  alter table public.yellowstone_photos enable row level security;
  drop policy if exists "anyone add yp" on public.yellowstone_photos;
  create policy "anyone add yp" on public.yellowstone_photos for insert to anon with check (true);
  drop policy if exists "anyone view yp" on public.yellowstone_photos;
  create policy "anyone view yp" on public.yellowstone_photos for select to anon using (true);

  drop policy if exists "anyone upload ys" on storage.objects;
  create policy "anyone upload ys" on storage.objects for insert to anon with check (bucket_id = 'yellowstone-album');
  drop policy if exists "anyone view ys" on storage.objects;
  create policy "anyone view ys" on storage.objects for select to anon using (bucket_id = 'yellowstone-album');

  drop policy if exists "Anyone can read buckets" on storage.buckets;
  create policy "Anyone can read buckets" on storage.buckets for select using (true);
  ==========================================================
-->
</body>
